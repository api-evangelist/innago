aid: innago
name: Innago
description: >-
  Innago is a free property management software platform with a REST API for
  managing leases, tenant applications, rent collection, maintenance requests,
  invoicing, and landlord-tenant communication. The API uses Bearer token and
  API key authentication and provides endpoints for properties, units, tenants,
  leases, invoices, payments, expenses, and maintenance tickets.
